<svg width="24" height="24" viewBox="0 0 24 24"
     fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Terminal brackets -->
  <path d="M4 4.5H2.5V19.5H4"
        stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 4.5H21.5V19.5H20"
        stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Prompt chevron -->
  <polyline points="6,8.5 9.5,12 6,15.5"
            stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Dollar sign — stems (both overlap into S endpoints) -->
  <line x1="15" y1="4.5" x2="15" y2="6.5"
        stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round"/>
  <line x1="15" y1="15.5" x2="15" y2="19.5"
        stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round"/>

  <!-- Dollar sign — S curve -->
  <path d="M18 9 C18 7.6 17 6.5 15.5 6.5
           H14.5 C13 6.5 12 7.4 12 9
           C12 10.3 13 11 14.5 11
           H15.5 C17 11 18 11.7 18 13
           C18 14.6 17 15.5 15.5 15.5
           H14.5 C13 15.5 12 14.4 12 13"
        stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Cursor block -->
  <rect x="19" y="15" width="2.5" height="1.4"
        fill="currentColor" rx="0.3"/>

</svg>