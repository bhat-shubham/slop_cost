<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- SlopCost icon: dollar sign + descending trend line
       Concept: "AI cost going down" — the core value prop.
       Monochrome, currentColor, clean strokes, no fills. -->

  <!-- Dollar sign — centered, the primary symbol -->
  <line x1="12" y1="3" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="15" x2="12" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M8.5 7.5C8.5 6.12 10.07 5 12 5c1.93 0 3.5 1.12 3.5 2.5S13.93 10 12 10s-3.5 1.12-3.5 2.5c0 1.38 1.57 2.5 3.5 2.5 1.93 0 3.5-1.12 3.5-2.5"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Descending trend line — bottom section -->
  <polyline points="3,18 8,19 13,18.5 18,21"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polyline points="15,21 18,21 18,18"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
